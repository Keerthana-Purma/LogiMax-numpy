<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Species Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #5a6c7d;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .result {
            margin-top: 25px;
            padding: 12px;
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            color: #2c3e50;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Iris Classifier</h2>

        <form action="/predict" method="POST">
            <div class="input-group">
                <label for="sepal_length">Sepal Length (cm)</label>
                <input type="number" step="0.1" name="sepal_length" id="sepal_length" placeholder="e.g. 5.1" required>
            </div>

            <div class="input-group">
                <label for="sepal_width">Sepal Width (cm)</label>
                <input type="number" step="0.1" name="sepal_width" id="sepal_width" placeholder="e.g. 3.5" required>
            </div>

            <div class="input-group">
                <label for="petal_length">Petal Length (cm)</label>
                <input type="number" step="0.1" name="petal_length" id="petal_length" placeholder="e.g. 1.4" required>
            </div>

            <div class="input-group">
                <label for="petal_width">Petal Width (cm)</label>
                <input type="number" step="0.1" name="petal_width" id="petal_width" placeholder="e.g. 0.2" required>
            </div>

            <button type="submit">Predict</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>

</body>

</html>
